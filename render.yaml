services:
  # Python Flask Backend
  - type: web
    name: dermaai-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --workers 1 --threads 4 --timeout 120"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
